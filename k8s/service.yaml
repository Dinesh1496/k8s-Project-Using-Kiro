apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: flask-app
  labels:
    app: flask-app
    component: service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
spec:
  type: ClusterIP          # Internal only; Ingress handles external traffic
  selector:
    app: flask-app
  ports:
    - name: http
      protocol: TCP
      port: 80             # Service port (cluster-internal)
      targetPort: 5000     # Container port
